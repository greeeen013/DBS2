services:
  db:
    image: postgres:16
    container_name: dbs2_postgres
    environment:
      POSTGRES_USER: admin_dbs2
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: mma_club_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: dbs2_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: password123
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  db_data:
